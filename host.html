<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;font-family:Arial;">

<h2>Viewer (Computer)</h2>
<input id="room" placeholder="Room code">
<button onclick="start()">Connect</button>

<br><br>
<video id="video" autoplay playsinline style="width:90%;max-width:500px;"></video>

<script src="https://cdn.jsdelivr.net/npm/simple-peer@9/simplepeer.min.js"></script>

<script>
let peer;
const socket = new WebSocket("wss://signal-server-1.glitch.me");

function start() {
  const room = document.getElementById("room").value;

  peer = new SimplePeer({ initiator: true, trickle: false });

  peer.on("signal", data => {
    socket.send(JSON.stringify({ room, data }));
  });

  peer.on("stream", stream => {
    document.getElementById("video").srcObject = stream;
  });

  socket.onmessage = msg => {
    const message = JSON.parse(msg.data);
    if (message.room === room) {
      peer.signal(message.data);
    }
  };
}
</script>

</body>
</html>
